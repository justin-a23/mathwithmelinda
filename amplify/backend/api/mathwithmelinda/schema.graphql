input AMPLIFY { globalAuthRule: AuthRule = { allow: public } }

type Course @model {
  id: ID!
  title: String!
  description: String
  gradeLevel: String
  lessons: [Lesson] @hasMany
  assignments: [Assignment] @hasMany
  enrollments: [Enrollment] @hasMany
}

type Lesson @model {
  id: ID!
  title: String!
  videoUrl: String
  order: Int
  course: Course @belongsTo
}

type Assignment @model {
  id: ID!
  title: String!
  description: String
  dueDate: String
  course: Course @belongsTo
  submissions: [Submission] @hasMany
}

type Submission @model {
  id: ID!
  studentId: String!
  content: String
  grade: String
  submittedAt: String
  assignment: Assignment @belongsTo
}

type Enrollment @model {
  id: ID!
  studentId: String!
  course: Course @belongsTo
}