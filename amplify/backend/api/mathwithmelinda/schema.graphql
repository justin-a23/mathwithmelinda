input AMPLIFY { globalAuthRule: AuthRule = { allow: public } }

type AcademicYear @model {
  id: ID!
  year: String!
  semesters: [Semester] @hasMany
}

type Semester @model {
  id: ID!
  name: String!
  startDate: String!
  endDate: String!
  isActive: Boolean
  courseId: ID
  course: Course @belongsTo(fields: ["courseId"])
  academicYear: AcademicYear @belongsTo
  enrollments: [Enrollment] @hasMany
  weeklyPlans: [WeeklyPlan] @hasMany
  lessonWeightPercent: Int
  testWeightPercent: Int
  quizWeightPercent: Int
  gradeA: Int
  gradeB: Int
  gradeC: Int
  gradeD: Int
}

type Course @model {
  id: ID!
  title: String!
  description: String
  gradeLevel: String
  isArchived: Boolean
  lessons: [Lesson] @hasMany
  assignments: [Assignment] @hasMany
  enrollments: [Enrollment] @hasMany
  weeklyPlans: [WeeklyPlan] @hasMany
  lessonTemplates: [LessonTemplate] @hasMany
  semesters: [Semester] @hasMany
}

type Lesson @model {
  id: ID!
  title: String!
  videoUrl: String
  instructions: String
  order: Int
  isPublished: Boolean
  course: Course @belongsTo
  weeklyPlanItems: [WeeklyPlanItem] @hasMany
}

type WeeklyPlan @model {
  id: ID!
  weekStartDate: String!
  assignedStudentIds: String
  semester: Semester @belongsTo
  course: Course @belongsTo
  items: [WeeklyPlanItem] @hasMany
}

type WeeklyPlanItem @model {
  id: ID!
  dayOfWeek: String!
  dueTime: String
  isPublished: Boolean
  lesson: Lesson @belongsTo
  lessonTemplateId: ID
  weeklyPlan: WeeklyPlan @belongsTo
  assignments: [Assignment] @hasMany
}

type Assignment @model {
  id: ID!
  title: String!
  description: String
  dueDate: String
  course: Course @belongsTo
  submissions: [Submission] @hasMany
}

type Submission @model {
  id: ID!
  studentId: String!
  content: String
  answers: String
  imageUrls: String
  lessonTemplateId: String
  grade: String
  submittedAt: String
  teacherComment: String
  isArchived: Boolean
  archivedAt: String
  status: String
  returnReason: String
  returnDueDate: String
  assignment: Assignment @belongsTo
  messages: [SubmissionMessage] @hasMany
}

type SubmissionMessage @model {
  id: ID!
  senderId: String!
  senderType: String!
  message: String!
  isRead: Boolean
  submission: Submission @belongsTo
}

type Enrollment @model {
  id: ID!
  studentId: String!
  planType: String
  course: Course @belongsTo
  semester: Semester @belongsTo
}

type LessonTemplate @model {
  id: ID!
  lessonNumber: Int!
  title: String!
  instructions: String
  worksheetUrl: String
  videoUrl: String
  assignmentType: String
  lessonCategory: String
  course: Course @belongsTo
  questions: [AssignmentQuestion] @hasMany
}

type AssignmentQuestion @model {
  id: ID!
  order: Int!
  questionText: String!
  questionType: String!
  choices: String
  correctAnswer: String
  lessonTemplate: LessonTemplate @belongsTo
}

type TeacherProfile @model {
  id: ID!
  userId: String!
  email: String!
  displayName: String
  bio: String
  profilePictureKey: String
  teachingVoice: String
}

type VideoWatch @model {
  id: ID!
  studentId: String!
  lessonId: String!
  weeklyPlanItemId: String
  watchedSeconds: Float
  durationSeconds: Float
  percentWatched: Float
  completed: Boolean
  lastWatchedAt: String
}

type ParentInvite @model {
  id: ID!
  token: String!
  studentEmail: String!
  studentName: String!
  used: Boolean
}

type ParentStudent @model {
  id: ID!
  parentId: String!
  studentEmail: String!
  studentName: String!
}

type StudentProfile @model {
  id: ID!
  userId: String!
  email: String!
  firstName: String!
  lastName: String!
  preferredName: String
  gradeLevel: String
  courseId: String
  planType: String
  profilePictureKey: String
  status: String
  statusReason: String
  parentEmail: String
  parentName: String
  parentEmail2: String
  parentName2: String
  parentLinks: [ParentStudentLink] @hasMany
}

type ParentProfile @model {
  id: ID!
  userId: String!
  email: String!
  firstName: String!
  lastName: String!
  studentLinks: [ParentStudentLink] @hasMany
}

type ParentStudentLink @model {
  id: ID!
  parentProfileId: ID!
  parentProfile: ParentProfile @belongsTo(fields: ["parentProfileId"])
  studentProfileId: ID!
  studentProfile: StudentProfile @belongsTo(fields: ["studentProfileId"])
}

type Message @model {
  id: ID!
  studentId: String!
  studentName: String
  content: String!
  sentAt: String!
  isRead: Boolean
  teacherReply: String
  repliedAt: String
  isArchivedByTeacher: Boolean
}

type Syllabus @model {
  id: ID!
  semesterId: ID!
  courseId: ID!
  pdfKey: String
  publishedPdfKey: String
  publishedAt: String
}