version: 1
backend:
  phases:
    build:
      commands:
        - '# Execute Amplify CLI with the helper script'
        - amplifyPush --simple
frontend:
  phases:
    preBuild:
      commands:
        # npm ci/install with macOS lockfile won't resolve linux native binaries
        # See https://github.com/npm/cli/issues/4828
        # Delete lockfile + node_modules so npm resolves fresh for linux-x64
        - rm -rf node_modules package-lock.json
        - npm install --cache .npm
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
